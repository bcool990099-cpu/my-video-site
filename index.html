<!DOCTYPE html>
<html>
<head><title>V6 WALK</title>
<style>body{background:#000;color:#0f0;text-align:center;font-family:monospace;}canvas{background:#111;border:2px solid #0f0;}</style>
</head>
<body>
<h1>V6: WALKING MAN</h1>
<canvas id="c" width="600" height="400"></canvas>
<script>
var c=document.getElementById("c"),ctx=c.getContext("2d"),x=0,f=0;
function d(){
ctx.fillStyle="black";ctx.fillRect(0,0,600,400);
ctx.strokeStyle="#0f0";ctx.lineWidth=5;
ctx.beginPath();ctx.moveTo(0,300);ctx.lineTo(600,300);ctx.stroke();
x=(x+4)%650-50;
var b=Math.sin(f*0.2)*10,s=Math.sin(f*0.2)*35;
ctx.beginPath();ctx.arc(x,200+b,15,0,Math.PI*2);ctx.stroke();
ctx.beginPath();ctx.moveTo(x,215+b);ctx.lineTo(x,260+b);ctx.stroke();
ctx.beginPath();ctx.moveTo(x,260+b);ctx.lineTo(x+s,300);ctx.stroke();
ctx.beginPath();ctx.moveTo(x,260+b);ctx.lineTo(x-s,300);ctx.stroke();
f++;requestAnimationFrame(d);
}
d();
</script>
</body>
</html>
