<!DOCTYPE html><html><body style="background:blue;color:white;text-align:center;font-family:sans-serif;display:flex;flex-direction:column;justify-content:center;align-items:center;height:100vh;"><h1>V4: BLUE VERSION - PUSHED VIA TERMINAL</h1><canvas id="c" width="600" height="400" style="background:black;border:5px solid white;"></canvas><script>const canvas=document.getElementById("c");const ctx=canvas.getContext("2d");let x=0,f=0;function animate(){ctx.fillStyle="black";ctx.fillRect(0,0,600,400);ctx.strokeStyle="white";ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(0,300);ctx.lineTo(600,300);ctx.stroke();x=(x+5)%650-50;let b=Math.sin(f*0.2)*10,s=Math.sin(f*0.2)*40;ctx.beginPath();ctx.arc(x,200+b,15,0,Math.PI*2);ctx.stroke();ctx.beginPath();ctx.moveTo(x,215+b);ctx.lineTo(x,260+b);ctx.stroke();ctx.beginPath();ctx.moveTo(x,260+b);ctx.lineTo(x+s,300);ctx.stroke();ctx.beginPath();ctx.moveTo(x,260+b);ctx.lineTo(x-s,300);ctx.stroke();f++;requestAnimationFrame(animate);}animate();</script></body></html>
